services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: trackr
      POSTGRES_PASSWORD: trackr
      POSTGRES_DB: trackr_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trackr -d trackr_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio:
    image: minio/minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9100:9000"   # MinIO API     → http://localhost:9100
      - "9101:9001"   # MinIO console → http://localhost:9101
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:
